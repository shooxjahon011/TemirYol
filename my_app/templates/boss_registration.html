
<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boshliqlar Registratsiyasi</title>

    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" content="#00f2ff">

    <style>
        :root { --neon: #00f2ff; }
        body {
            background: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .reg-box {
            background: #111;
            padding: 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--neon);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        h2 { color: var(--neon); text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #333;
            background: #222;
            color: white;
            box-sizing: border-box;
        }
        input:focus, select:focus { outline: none; border-color: var(--neon); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            width: 100%;
            padding: 15px;
            background: var(--neon);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            color: black;
            transition: 0.3s;
        }
        button:hover { background: #00c8d4; transform: translateY(-2px); }
        label { font-size: 12px; color: #888; margin-left: 5px; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="reg-box">
        <h2>Boshliq Ro'yxati</h2>
        <form method="POST">
            {% csrf_token %}

            <div class="grid-2">
                <input type="text" name="f_name" placeholder="Ism" required>
                <input type="text" name="l_name" placeholder="Familiya" required>
            </div>

            <input type="text" name="u_login" placeholder="Login" required>
            <input type="password" name="u_pass" placeholder="Parol" required>
            <input type="text" name="phone" placeholder="Telefon (998...)" required>

            <label>Otryad:</label>
            <select name="otryad">
                <option value="">Tanlanmagan</option>
                {% for o in otryadlar %}
                    <option value="{{ o.id }}">{{ o.nomi }}</option>
                {% endfor %}
            </select>

            <label>Guruh:</label>
            <select name="guruh">
                <option value="">Tanlanmagan</option>
                {% for g in guruhlar %}
                    <option value="{{ g.id }}">{{ g.nomi }}</option>
                {% endfor %}
            </select>

            <hr style="border: 0.5px solid #222; margin: 20px 0;">
            <p style="font-size: 14px; color: var(--neon);">Yashash manzili:</p>

            <div class="grid-2">
                <input type="text" name="viloyat" placeholder="Viloyat">
                <input type="text" name="tuman" placeholder="Tuman">
            </div>
            <input type="text" name="mahalla" placeholder="Mahalla">
            <div class="grid-2">
                <input type="text" name="kocha" placeholder="Ko'cha">
                <input type="text" name="uy" placeholder="Uy raqami">
            </div>

            <button type="submit">TASDIQLASH VA SAQLASH</button>
        </form>
    </div>

    <script>
        // Service Worker ro'yxatdan o'tkazish (PWA uchun)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{% static 'sw.js' %}")
                .then(reg => console.log('SW faol'))
                .catch(err => console.log('SW xato:', err));
            });
        }
    </script>
</body>
</html>
