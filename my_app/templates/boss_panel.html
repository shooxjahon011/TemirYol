
<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Panel | {{ display_name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050505;
            --accent: #00f2ff;
            --boss-red: #ff3838;
            --live-green: #00ff88;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body { margin: 0; background: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        #bg-video {
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            z-index: -2; transform: translate(-50%, -50%); object-fit: cover;
            filter: brightness(0.2) contrast(1.2);
        }

        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); z-index: -1; }

        .header {
            position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px);
            z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .brand { font-size: 20px; font-weight: 900; letter-spacing: 2px; }
        .brand span { color: var(--boss-red); text-shadow: 0 0 10px var(--boss-red); }

        .user-info { display: flex; align-items: center; gap: 12px; background: var(--glass); padding: 6px 18px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
        .avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }

        .container { padding: 40px 20px; max-width: 800px; margin: 0 auto; text-align: center; }

        h1 { font-size: 32px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .dept-tag { color: var(--accent); font-weight: 600; opacity: 0.8; margin-bottom: 40px; display: block; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

        .card {
            background: var(--glass); backdrop-filter: blur(10px); border-radius: 30px;
            padding: 35px 20px; text-decoration: none; color: white;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            position: relative; overflow: hidden;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--accent); background: rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,242,255,0.2); }
        .card i { font-size: 40px; color: var(--accent); transition: 0.3s; }
        .card span { font-weight: 700; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* Maxsus elementlar */
        .live-track { border: 1.5px solid var(--live-green); }
        .live-track i { color: var(--live-green); }
        .live-badge {
            position: absolute; top: 15px; right: 15px; background: var(--live-green);
            color: black; font-size: 11px; font-weight: 900; padding: 3px 10px; border-radius: 20px;
            box-shadow: 0 0 15px var(--live-green); animation: pulse 1.5s infinite;
        }

        .full-width { grid-column: span 2; border-color: var(--boss-red); }
        .logout { border-color: #444; opacity: 0.8; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        @media (max-width: 500px) {
            .menu-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <video autoplay loop playsinline muted id="bg-video">
        <source src="{{ video_url }}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="header">
        <div class="brand">TEMIR<span>YO'L</span></div>
        <div class="user-info">
            <span>{{ display_name }}</span>
            <img src="{{ avatar_url }}" class="avatar">
        </div>
    </div>

    <div class="container">
        <h1>Xush kelibsiz, Boss!</h1>
        <span class="dept-tag"><i class="fas fa-building"></i> {{ guruh_nomi }}</span>

        <div class="menu-grid">
            <a href="/active-workers/" class="card live-track">
                <div class="live-badge">{{ active_workers_count }} LIVE</div>
                <i class="fas fa-satellite-dish"></i>
                <span>Jonli Kuzatuv</span>
            </a>

            <a href="/Baxtsizhodisalar/" class="card">
                <i class="fas fa-biohazard"></i>
                <span>Xavfli Hodisalar</span>
            </a>

            <a href="/kunlik/" class="card full-width">
                <i class="fas fa-file-invoice-dollar"></i>
                <span>Ishchilarning Umumiy Hisoboti</span>
            </a>

            <a href="/logout/" class="card logout">
                <i class="fas fa-power-off"></i>
                <span>Tizimdan Chiqish</span>
            </a>
        </div>
    </div>

    <script>
        // Video ovozini boshqarish yoki boshqa dinamik effektlar
        document.body.addEventListener('click', () => {
            const video = document.getElementById('bg-video');
            if (video.muted) { video.muted = false; video.volume = 0.2; }
        }, { once: true });
    </script>
</body>
</html>
