<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="theme-color" content="#ff3838">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="{% static 'icons/image.png' %}">

    <title>Bosh Menyu | TemirYo'l</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --accent: #00f2ff;
            --green: #00ff88;
            --danger: #ff4747;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -2; transform: translate(-50%, -50%);
            object-fit: cover; filter: brightness(0.35);
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); z-index: -1; }

        .header {
            position: sticky; top: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px); z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .brand { font-weight: 900; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; }
        .brand span { color: #fff; }

        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
        .user-info img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .user-info span { font-size: 14px; font-weight: 500; }

        .container { padding: 25px 20px; max-width: 500px; margin: 0 auto; }

        /* ISH BOSHLASH TUGMASI */
        .work-status-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 25px; padding: 20px; margin-bottom: 30px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }

        .work-btn {
            width: 100%; padding: 18px; border-radius: 18px; font-size: 18px; font-weight: 800;
            border: none; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-idle { background: var(--green); color: #000; box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2); }
        .btn-working { background: var(--danger); color: #fff; animation: pulse 2s infinite; box-shadow: 0 10px 20px rgba(255, 71, 71, 0.3); }

        .work-btn:active { transform: scale(0.96); }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

        .card {
            background: var(--glass); backdrop-filter: blur(12px); border-radius: 24px;
            padding: 25px 15px; text-decoration: none; color: #fff;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s ease;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center;
        }
        .card i { font-size: 32px; color: var(--accent); filter: drop-shadow(0 0 8px rgba(0, 242, 255, 0.4)); }
        .card span { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; }

        .card:hover { background: rgba(255,255,255,0.15); border-color: var(--accent); }
        .card:active { transform: translateY(4px); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 71, 71, 0.5); } 100% { box-shadow: 0 0 0 20px rgba(255, 71, 71, 0); } }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; padding: 15px 0;
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); z-index: 2000;
        }
        .nav-item { color: #666; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 10px; font-weight: bold; transition: 0.3s; }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--accent); }
        .nav-item.active i { filter: drop-shadow(0 0 5px var(--accent)); }
    </style>
</head>
<body>
    <video autoplay loop playsinline muted id="bg-video">
        <source src="{{ video_url }}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="header">
        <div class="brand">Temir<span>Yo'l</span></div>
        <div class="user-info">
            <span>{{ display_name }}</span>
            <img src="{{ avatar_url }}" alt="Profile">
        </div>
    </div>

    <div class="container">
        <div class="work-status-card">
            <p style="margin: 0 0 15px 0; font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px;">
                Tizim holati: <b>{% if is_working %}Faol{% else %}Kutish rejimida{% endif %}</b>
            </p>
            <button onclick="toggleWork()" class="work-btn {{ btn_class }}">
                <i class="fas fa-power-off"></i>
                {{ btn_text }}
            </button>
        </div>

        <div class="menu-grid">
            <a href="/okladmenu/" class="card"><i class="fas fa-wallet"></i><span>Maosh & Oklad</span></a>
            <a href="/tatil/" class="card"><i class="fas fa-calendar-check"></i><span>Ta'til Rejasi</span></a>
            <a href="/hisobot/" class="card"><i class="fas fa-file-signature"></i><span>Ish Hisoboti</span></a>
            <a href="/Baxtsizhodisalar/" class="card"><i class="fas fa-shield-virus"></i><span>Xavfsizlik</span></a>
            <a href="/profile/" class="card"><i class="fas fa-user-gear"></i><span>Profil Sozlamalari</span></a>
            <a href="https://t.me/STAREVOID" target="_blank" class="card"><i class="fas fa-comment-dots"></i><span>Texnik Qo'llab</span></a>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="/second/" class="nav-item active"><i class="fas fa-th-large"></i><span>Asosiy</span></a>
        <a href="/chats/" class="nav-item"><i class="fas fa-envelope"></i><span>Xabarlar</span></a>
        <a href="/profile/" class="nav-item"><i class="fas fa-id-badge"></i><span>Profil</span></a>
        <a href="/logout/" class="nav-item" style="color:var(--danger);"><i class="fas fa-door-open"></i><span>Chiqish</span></a>
    </div>

    <script>
        // PWA Service Worker Ro'yxatdan o'tkazish
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW faol:', reg.scope))
                    .catch(err => console.log('SW xatosi:', err));
            });
        }

        let isWorking = {{ is_working|yesno:"true,false" }};
        let watchId = null;

        // Sahifa yuklanganda ishlayotgan bo'lsa GPSni yoqish
        if(isWorking) startGPS();

        async function toggleWork() {
            const action = isWorking ? 'stop' : 'start';

            // UI darhol vizual javob berishi uchun tugmani vaqtincha bloklash
            const btn = document.querySelector('.work-btn');
            btn.style.opacity = '0.5';
            btn.disabled = true;

            try {
                const res = await fetch('/toggle-work/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: new URLSearchParams({ 'action': action })
                });

                if(res.ok) {
                    location.reload();
                }
            } catch (err) {
                alert("Aloqa xatosi! Internetni tekshiring.");
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        }

        function startGPS() {
            if(navigator.geolocation) {
                // Backgroundda ishlashi uchun imkon qadar yuqori aniqlik
                watchId = navigator.geolocation.watchPosition(pos => {
                    sendLocation(pos.coords.latitude, pos.coords.longitude);
                }, err => {
                    console.error("GPS Error:", err);
                    if(err.code === 1) alert("Iltimos, GPS ruxsatini bering!");
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 30000, // 30 soniyada bir keshni yangilash
                    timeout: 27000
                });
            }
        }

        async function sendLocation(lat, lng) {
            const data = new FormData();
            data.append('lat', lat);
            data.append('lng', lng);
            data.append('csrfmiddlewaretoken', '{{ csrf_token }}');

            try {
                await fetch('/update-location/', { method: 'POST', body: data });
            } catch(e) {
                console.log("Kordinata yuborishda xatolik");
            }
        }
    </script>
</body>
</html>
